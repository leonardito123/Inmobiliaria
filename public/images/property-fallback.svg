<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-label="Imagen de propiedad">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2c5f8a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="900" fill="url(#bg)"/>
  <rect width="1200" height="900" fill="url(#grid)"/>

  <g fill="none" stroke="rgba(255,255,255,0.20)" stroke-width="3">
    <rect x="140" y="210" width="920" height="500" rx="18"/>
    <rect x="200" y="280" width="260" height="350" rx="10"/>
    <rect x="500" y="280" width="500" height="180" rx="10"/>
    <rect x="500" y="490" width="500" height="140" rx="10"/>
  </g>

  <text x="600" y="140" text-anchor="middle" fill="#f5f0e8" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="44" font-weight="700">HAVRE ESTATES</text>
  <text x="600" y="190" text-anchor="middle" fill="#d4c9b0" font-family="'IBM Plex Sans', Arial, sans-serif" font-size="24">Imagen de referencia de propiedad</text>
</svg>
