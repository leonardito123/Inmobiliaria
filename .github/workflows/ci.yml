name: CI

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, develop, staging]

jobs:
  repo-health:
    name: repo-health
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Basic structure check
        run: |
          test -f README.md
          test -f docs/BRANCHING.md

  markdown-lint:
    name: markdown-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint markdown files
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md

  detect-stack:
    name: detect-stack
    runs-on: ubuntu-latest
    outputs:
      has_node: ${{ steps.detect.outputs.has_node }}
      has_python: ${{ steps.detect.outputs.has_python }}
      has_php: ${{ steps.detect.outputs.has_php }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect project stack
        id: detect
        shell: bash
        run: |
          if [ -f package.json ]; then echo "has_node=true" >> "$GITHUB_OUTPUT"; else echo "has_node=false" >> "$GITHUB_OUTPUT"; fi
          if [ -f requirements.txt ] || [ -f pyproject.toml ]; then echo "has_python=true" >> "$GITHUB_OUTPUT"; else echo "has_python=false" >> "$GITHUB_OUTPUT"; fi
          if [ -f composer.json ]; then echo "has_php=true" >> "$GITHUB_OUTPUT"; else echo "has_php=false" >> "$GITHUB_OUTPUT"; fi

  node-ci:
    name: node-ci
    runs-on: ubuntu-latest
    needs: detect-stack
    if: needs.detect-stack.outputs.has_node == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm test --if-present

      - name: Build
        run: npm run build --if-present

  python-ci:
    name: python-ci
    runs-on: ubuntu-latest
    needs: detect-stack
    if: needs.detect-stack.outputs.has_python == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install .; fi

      - name: Test
        run: pytest -q

  php-ci:
    name: php-ci
    runs-on: ubuntu-latest
    needs: detect-stack
    if: needs.detect-stack.outputs.has_php == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Test
        run: composer test --no-interaction
